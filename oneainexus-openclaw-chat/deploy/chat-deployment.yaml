apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-chat-web
  labels:
    app: openclaw-chat-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-chat-web
  template:
    metadata:
      labels:
        app: openclaw-chat-web
    spec:
      containers:
        - name: web
          image: registry.ccloud.conestore.cn:8443/aicloud/oneainexus-openclaw-chat:v202604132314 # 替换为你实际的镜像名称
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # 数据库配置，直接指向 mysql-deployment.yaml 中的 Service 名
            - name: MYSQL_HOST
              value: "openclaw-chat-mysql"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "openclaw"
            - name: MYSQL_PASSWORD
              value: "openclaw123456"
            - name: MYSQL_DATABASE
              value: "openclaw_chat"
            
            # 认证服务配置
            - name: NUXT_AUTH_API_URL
              value: "http://mlops-user-be-service.pre-app.svc.cluster.local/aicloud/user/info"
            - name: NUXT_AUTH_TOKEN_HEADER
              value: "Authentication"
              
            # 基础环境变量
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-chat-web
  labels:
    app: openclaw-chat-web
spec:
  type: ClusterIP
  selector:
    app: openclaw-chat-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
